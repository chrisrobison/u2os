  <style>
    #arrows {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin-cw 10s linear infinite;
    }

    #gear {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin-ccw 8s linear infinite;
    }

    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
  </style>

