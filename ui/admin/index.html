<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="U2OS Admin Console for tenancy, instances, mappings, and platform configuration." />
    <meta property="og:title" content="U2OS Admin Console" />
    <meta property="og:description" content="U2OS Admin Console for tenancy, instances, mappings, and platform configuration." />
    <meta property="og:site_name" content="U2OS" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://u2os.com" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="U2OS Admin Console" />
    <meta name="twitter:description" content="U2OS Admin Console for tenancy, instances, mappings, and platform configuration." />
    <title>U2OS Admin Console</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <p class="eyebrow">U2OS</p>
          <h1>Admin</h1>
          <p class="subtitle">Platform management for multi-tenant operations</p>
        </div>

        <nav class="nav" aria-label="Sections">
          <button class="nav-item active" type="button" data-section="customers">
            <span>Customers</span>
            <span class="count" id="count-customers">0</span>
          </button>
          <button class="nav-item" type="button" data-section="instances">
            <span>Instances</span>
            <span class="count" id="count-instances">0</span>
          </button>
          <button class="nav-item" type="button" data-section="mappings">
            <span>Mappings</span>
            <span class="count" id="count-mappings">0</span>
          </button>
          <button class="nav-item" type="button" data-section="schemas">
            <span>Schemas</span>
            <span class="count" id="count-schemas">6</span>
          </button>
        </nav>

        <div class="session">
          <p class="session-user" id="sessionUser">Not signed in</p>
          <button id="logoutButton" class="refresh" type="button">Sign Out</button>
          <button id="refreshButton" class="refresh" type="button">Refresh Data</button>
        </div>
      </aside>
      <div class="resize-handle vertical" id="verticalResizeHandle" role="separator" aria-orientation="vertical" aria-label="Resize sidebar"></div>

      <section class="workspace">
        <header class="workspace-header">
          <div>
            <p class="eyebrow" id="sectionEyebrow">Section</p>
            <h2 id="sectionTitle">Customers</h2>
          </div>
          <p class="status" id="statusLine">Loading...</p>
        </header>

        <article class="pane pane-table" aria-live="polite">
          <div class="pane-header">
            <h3 id="tableTitle">Customers</h3>
          </div>
          <div class="table-wrap" id="tableWrap"></div>
        </article>

        <div class="resize-handle horizontal" id="horizontalResizeHandle" role="separator" aria-orientation="horizontal" aria-label="Resize right panes"></div>

        <article class="pane pane-detail" aria-live="polite">
          <div class="pane-header">
            <h3 id="detailTitle">Record details</h3>
          </div>
          <div class="detail-wrap" id="detailWrap"></div>
        </article>
      </section>
    </main>

    <div class="login-overlay" id="loginOverlay">
      <section class="login-card">
        <p class="eyebrow">Control Plane Access</p>
        <h2>Admin Sign In</h2>
        <p class="login-subtitle">Use your install admin account to manage customers, instances, and mappings.</p>
        <form id="loginForm" class="login-form">
          <label>Email<input type="email" name="email" autocomplete="username" required /></label>
          <label>Password<input type="password" name="password" autocomplete="current-password" required /></label>
          <button type="submit">Sign In</button>
        </form>
        <p class="login-status" id="loginStatus"></p>
      </section>
    </div>

    <script src="/admin/main.js"></script>
  </body>
</html>
