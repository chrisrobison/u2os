<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="U2OS Dashboard for managing entities, records, and operations across your workspace." />
    <meta property="og:title" content="U2OS Dashboard" />
    <meta property="og:description" content="U2OS Dashboard for managing entities, records, and operations across your workspace." />
    <meta property="og:site_name" content="U2OS" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://u2os.com" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="U2OS Dashboard" />
    <meta name="twitter:description" content="U2OS Dashboard for managing entities, records, and operations across your workspace." />
    <title>U2OS Dashboard</title>
    <link rel="stylesheet" href="/dashboard/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>U2OS</h1>
        <p class="subtle">Tables</p>
        <nav id="tableNav" class="table-nav"></nav>
      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div>
            <h2 id="tableTitle">Loading...</h2>
            <p id="systemMeta" class="subtle">Loading system metadata...</p>
          </div>
          <div class="actions">
            <input id="searchInput" type="search" placeholder="Search public ID, UUID, or text" />
            <button id="searchBtn" type="button">Search</button>
            <button id="refreshBtn" type="button">Refresh</button>
            <button id="newBtn" type="button">New</button>
          </div>
        </header>

        <section class="pane-grid">
          <section class="pane pane-top">
            <h3>Records</h3>
            <div id="recordsList" class="records-list"></div>
          </section>

          <section class="pane pane-bottom">
            <h3>Record Details</h3>
            <div id="recordSummary" class="record-summary"></div>
            <form id="recordForm" class="record-form"></form>
            <div class="actions form-actions">
              <button id="saveBtn" type="button">Save</button>
              <button id="deleteBtn" type="button" class="danger">Delete</button>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/dashboard/main.js"></script>
  </body>
</html>
