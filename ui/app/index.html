<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="U2OS Workspace runtime for vertical apps, workflows, and day-to-day operations." />
    <meta property="og:title" content="U2OS Workspace" />
    <meta property="og:description" content="U2OS Workspace runtime for vertical apps, workflows, and day-to-day operations." />
    <meta property="og:site_name" content="U2OS" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://u2os.com" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="U2OS Workspace" />
    <meta name="twitter:description" content="U2OS Workspace runtime for vertical apps, workflows, and day-to-day operations." />
    <title>U2OS Workspace</title>
    <link rel="stylesheet" href="/app/styles.css" />
    <script type="module" src="https://unpkg.com/@larcjs/core-lite@3.0.1/src/components/pan-bus.mjs"></script>
  </head>
  <body>
    <pan-bus id="appBus"></pan-bus>

    <div class="app-layout">
      <aside class="app-sidebar">
        <h1 id="appTitle">Loading app...</h1>
        <p id="appMeta" class="subtle">Loading app definition...</p>
        <nav id="navTree" class="nav-tree"></nav>
      </aside>

      <main class="app-main">
        <header class="main-header">
          <div id="tabs" class="tabs"></div>
          <p id="statusLine" class="subtle">Ready.</p>
        </header>

        <section id="tabPanels" class="tab-panels"></section>
      </main>
    </div>

    <!--
      ── Settings nav item ────────────────────────────────────────────────────
      Navigation is data-driven from the app definition JSON loaded via
      GET /api/apps/:appId. To surface the settings panel, add a leaf nav
      item to your app definition file (e.g. config/apps/default.json):

        {
          "id": "settings",
          "title": "Settings",
          "componentTag": "bos-settings-panel"
        }

      The <bos-settings-panel> custom element is registered by main.js and
      will be instantiated automatically when the user clicks the nav item.
      No additional componentProps are required — the component is self-contained.
      ──────────────────────────────────────────────────────────────────────────
    -->
    <script type="module" src="/app/main.js"></script>
  </body>
</html>
